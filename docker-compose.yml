version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kawepla-backend
    restart: unless-stopped
    ports:
      - "3013:3013"
    # Charge le fichier .env d'origine du backend à l'exécution (Runtime)
    # les secrets ne sont PAS inclus dans l'image, ils sont injectés à la volée.
    env_file:
      - ./backend/.env
    # Permet de se connecter à la base de données PostgreSQL de ta machine hôte (Ubuntu Server)
    # Utiliser "host.docker.internal" à la place de "localhost" dans le .env pour la DATABASE_URL
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - kawepla-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Docker Compose remplace les ${VARIABLES} par leur valeur du fichier .env à la RACINE du dossier.
      # Seules les variables publiques requises par Next.js sont passées.
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
        STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
    container_name: kawepla-frontend
    restart: unless-stopped
    ports:
      - "3012:3012"
    depends_on:
      - backend
    networks:
      - kawepla-network

networks:
  kawepla-network:
    driver: bridge
