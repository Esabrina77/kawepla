services:
  db:
    image: postgres:17-alpine
    container_name: kawepla-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Restaure automatiquement le backup lors du PREMIER lancement
      - ./kawepla.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - kawepla-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: esabrina77/kawepla-backend:latest
    container_name: kawepla-backend
    restart: unless-stopped
    ports:
      - "3013:3013"
    env_file:
      - ./backend/.env
    # Surcharge la DATABASE_URL pour pointer vers le conteneur DB au lieu de localhost
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@kawepla-db:5432/${POSTGRES_DB}
    depends_on:
      - db
    networks:
      - kawepla-network

  frontend:
    image: esabrina77/kawepla-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
        STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
    container_name: kawepla-frontend
    restart: unless-stopped
    ports:
      - "3012:3012"
    depends_on:
      - backend
    networks:
      - kawepla-network

volumes:
  postgres-data:

networks:
  kawepla-network:
    driver: bridge
