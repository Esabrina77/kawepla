services:
  db:
    image: postgres:17-alpine
    container_name: kawepla-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Restaure automatiquement le backup lors du PREMIER lancement
      - ./backup-16032026.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - kawepla-network

  backend:
    image: esabrina77/kawepla-backend:latest
    container_name: kawepla-backend
    restart: unless-stopped
    ports:
      - "3013:3013"
    env_file:
      - ./backend/.env
    # Surcharge la DATABASE_URL pour pointer vers le conteneur DB au lieu de localhost
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@kawepla-db:5432/${POSTGRES_DB}
    depends_on:
      - db
    networks:
      - kawepla-network

  frontend:
    image: esabrina77/kawepla-frontend:latest
    container_name: kawepla-frontend
    restart: unless-stopped
    ports:
      - "3012:3012"
    depends_on:
      - backend
    networks:
      - kawepla-network

volumes:
  postgres-data:

networks:
  kawepla-network:
    driver: bridge
